<!-- templates/base.html -->
{% load static %}
<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <title>{% block title %}點數兌換商城{% endblock %}</title>

    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

</head>
<body>

<!-- Navbar -->
<nav class="navbar navbar-expand-lg navbar-dark bg-dark">
  <div class="container">
    <a class="navbar-brand" href="/api/product-list">Points Shop</a>

    <div class="collapse navbar-collapse">
      <ul class="navbar-nav ms-auto">
        <li class="nav-item" id="addProductBtn" style="display:none;">
          <a class="nav-link" href="#" onclick="openProductModal()">刊登商品</a>
        </li>

        <li class="nav-item" id="showProductBtn">
          <a class="nav-link" href="#" onclick="showProductModal()">商品管理</a>
        </li>

        <li class="nav-item" id="myPoint">
          <a class="nav-link" href="#" onclick="showPointsInfo()">我的點數</a>
        </li>
        <ul class="navbar-nav ms-auto" id="nav-user"></ul>
      </ul>
    </div>
  </div>
</nav>

<!-- Main -->
<div class="container mt-4">
    {% block content %}
    {% endblock %}
</div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script src="{% static 'js/auth.js' %}"></script>
<script src="{% static 'js/products.js' %}"></script>
<script src="{% static 'js/points.js' %}"></script>
</body>
</html>

<!-- 我的點數 -->
<div class="modal fade" id="pointsModal" tabindex="-1">
  <div class="modal-dialog modal-dialog-centered">
    <div class="modal-content">

      <div class="modal-header">
        <h5 class="modal-title">我的點數</h5>
        <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
      </div>

      <div class="modal-body text-center">
        <h2 id="pointsValue">0</h2>
        <p>目前點數</p>

        <input 
            type="number" 
            id="depositAmount" 
            class="form-control mt-3" 
            placeholder="請輸入儲值金額"
            min="1"
        >

        <button class="btn btn-success mt-3" onclick="deposit()">儲值點數</button>
        <hr>
        
        <button 
            class="btn btn-outline-secondary w-100 mt-3"
            data-bs-toggle="collapse" 
            data-bs-target="#transactionCollapse">
            查看兌換紀錄
        </button>
        <div class="collapse mt-3" id="transactionCollapse">
        <h5 class="mt-3">交易紀錄</h5>

            <ul id="transactionList" class="list-group mt-2">
                <li class="list-group-item text-muted">尚無資料</li>
            </ul>
        </div>
      </div>
    </div>
  </div>
</div>

<!-- 我要刊登 -->
<div class="modal fade" id="productModal" tabindex="-1">
  <div class="modal-dialog modal-dialog-centered">
    <div class="modal-content">

      <div class="modal-header">
        <h5 class="modal-title">刊登商品</h5>
        <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
      </div>

      <div class="modal-body">

        <div class="mb-3">
          <label class="form-label">商品名稱</label>
          <input type="text" id="productName" class="form-control">
        </div>

        <div class="mb-3">
          <label class="form-label">所需點數</label>
          <input type="number" id="productPoints" class="form-control">
        </div>

        <div class="mb-3">
          <label class="form-label">數量</label>
          <input type="number" id="productStocks" class="form-control">
        </div>

        <button class="btn btn-primary w-100" onclick="createProduct()">
          上架商品
        </button>

      </div>

    </div>
  </div>
</div>

<!-- 商品管理 -->
<div class="modal fade" id="showProductModal" tabindex="-1">
  <div class="modal-dialog modal-dialog-centered modal-lg">

    <div class="modal-content">

      <div class="modal-header">
        <h5 class="modal-title">商品管理</h5>
        <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
      </div>

      <div class="modal-body">

        <!-- 商品列表 -->
        <div id="productList" class="row"></div>

        <!-- 空狀態 -->
        <div id="emptyState" class="text-center text-muted mt-3" style="display:none;">
            尚無商品
        </div>

      </div>

    </div>

  </div>
</div>


<script>
document.addEventListener("DOMContentLoaded", function () {
    const role = localStorage.getItem("role");
    const token = localStorage.getItem("access");
    const nav = document.getElementById("nav-user");

    if (token) {
        // 已登入
        nav.innerHTML = `
            <li class="nav-item">
                <a class="nav-link">Hi, 會員</a>
            </li>
            <li class="nav-item">
                <a class="nav-link" href="/api/login-page/" onclick="logout()">登出</a>
            </li>
        `;
    } else {
        // 未登入
        nav.innerHTML = `
            <li class="nav-item">
                <a class="nav-link" href="/api/login-page/">登入</a>
            </li>
            <li class="nav-item">
                <a class="nav-link" href="/api/register-page/">註冊</a>
            </li>
        `;
    }

    if (role === "merchant") {
        document.getElementById("addProductBtn").style.display = "block";
        document.getElementById("myPoint").style.display = "none";
        document.getElementById("showProductBtn").style.display = "block";
    } else {
        document.getElementById("addProductBtn").style.display = "none";
        document.getElementById("myPoint").style.display = "block";
        document.getElementById("showProductBtn").style.display = "none";
    }
});
</script>
