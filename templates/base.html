<!-- templates/base.html -->
{% load static %}
<!DOCTYPE html>

<head>

    <title>{% block title %}點數兌換商城{% endblock %}</title>

    <!-- Bootstrap -->

</head>
<body>

<!-- Navbar -->
<nav class="navbar navbar-expand-lg navbar-dark bg-dark">
  <div class="container">
    <a class="navbar-brand" href="/api/product-list">Points Shop</a>

    <div class="collapse navbar-collapse">
      <ul class="navbar-nav ms-auto">
        <a id="mainNavLink" class="nav-link"></a>

        <!-- <li class="nav-item">
          <a class="nav-link" href="/api/product-list">商品列表</a>
        </li> -->

        <li class="nav-item">
          <a class="nav-link" href="#" onclick="showPointsInfo()">我的點數</a>
        </li>

        <!-- {% if user.is_authenticated %}
          <li class="nav-item">
            <a class="nav-link" href="#">Hi, {{ user.username }}</a>
          </li>
          <li class="nav-item">
            <a class="nav-link" href="/logout">我要刊登</a>
          </li>
          <li class="nav-item">
            <a class="nav-link" href="/logout">登出</a>
          </li>
        {% else %}
          <li class="nav-item">
            <a class="nav-link" href="/api/login-page/">登入</a>
          </li>
          <li class="nav-item">
            <a class="nav-link" href="/api/register-page">註冊</a>
          </li>
        {% endif %} -->
        <ul class="navbar-nav ms-auto" id="nav-user"></ul>
      </ul>
    </div>
  </div>
</nav>

<!-- Main -->
<div class="container mt-4">
    {% block content %}
    {% endblock %}
</div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script src="{% static 'js/auth.js' %}"></script>
</body>
</html>

<div class="modal fade" id="pointsModal" tabindex="-1">
  <div class="modal-dialog modal-dialog-centered">
    <div class="modal-content">

      <div class="modal-header">
        <h5 class="modal-title">我的點數</h5>
        <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
      </div>

      <div class="modal-body text-center">
        <h2 id="pointsValue">0</h2>
        <p>目前點數</p>

        <input 
            type="number" 
            id="depositAmount" 
            class="form-control mt-3" 
            placeholder="請輸入儲值金額"
            min="1"
        >

        <button class="btn btn-success mt-3" onclick="deposit()">儲值點數</button>
        <hr>
        
        <button 
            class="btn btn-outline-secondary w-100 mt-3"
            data-bs-toggle="collapse" 
            data-bs-target="#transactionCollapse">
            查看兌換紀錄
        </button>
        <div class="collapse mt-3" id="transactionCollapse">
        <h5 class="mt-3">交易紀錄</h5>

            <ul id="transactionList" class="list-group mt-2">
                <li class="list-group-item text-muted">尚無資料</li>
            </ul>
        </div>
      </div>
    </div>
  </div>
</div>

<script>
document.addEventListener("DOMContentLoaded", function () {
    const role = localStorage.getItem("role");
    const token = localStorage.getItem("access");
    const nav = document.getElementById("nav-user");
    const navLink = document.getElementById("mainNavLink");

    if (token) {
        // 已登入
        nav.innerHTML = `
            <li class="nav-item">
                <a class="nav-link">Hi, 會員</a>
            </li>
            <li class="nav-item">
                <a class="nav-link" href="/api/login-page/" onclick="logout()">登出</a>
            </li>
        `;
    } else {
        // 未登入
        nav.innerHTML = `
            <li class="nav-item">
                <a class="nav-link" href="/api/login-page/">登入</a>
            </li>
            <li class="nav-item">
                <a class="nav-link" href="/api/register-page/">註冊</a>
            </li>
        `;
    }

    if (role === "merchant") {
        console.log("HI")
        navLink.innerText = "我要刊登";
        navLink.href = "/add-product/";
    } else {
        navLink.style.display = "none";
    }
});


function showPointsInfo() {

    const access = localStorage.getItem("access");

    if (!access) {
        alert("請先登入才能查看點數");
        return;
    }

    const points = localStorage.getItem("points") || 0;

    document.getElementById("pointsValue").innerText = points;

    fetch("/api/member_transactions", {
        method: "GET",
        headers: {
            "Authorization": "Bearer " + access
        }
    })
    .then(res => res.json())
    .then(data => {

        const list = document.getElementById("transactionList");
        list.innerHTML = "";

        if (data.length === 0) {
            list.innerHTML = `<li class="list-group-item text-muted">尚無交易紀錄</li>`;
            return;
        }

        data.forEach(tx => {
            const item = document.createElement("li");
            item.className = "list-group-item";

            item.innerText = `
                商品: ${tx.product_name || tx.product} 
                使用點數: ${tx.points_used}
                時間: ${new Date(tx.created_at).toLocaleString('zh-TW') || ""}
                            `;

            list.appendChild(item);
        });

    })
    .catch(err => {
        console.error(err);
    });

    const modal = new bootstrap.Modal(document.getElementById('pointsModal'));
    modal.show();
}

async function deposit() {
    console.log("token:", localStorage.getItem("access"));
    const token = localStorage.getItem("access");


    const amountInput = document.getElementById("depositAmount");
    const amount = parseInt(amountInput.value);

    // const res = await fetch("/api/users/deposit/", {
    //     method: "POST",
    //     headers: {
    //         "Content-Type": "application/json",
    //         "Authorization": "Bearer " + token
    //     },
    //     body: JSON.stringify({
    //         amount: amount
    //     })
    // });

    const res = await authFetch("/api/users/deposit/", {
        method: "POST",
        headers: {
            "Content-Type": "application/json"
        },
        body: JSON.stringify({ amount: amount })
    });

    const data = await res.json();

    if (res.ok) {
        alert("儲值成功：" + data.points);
        document.getElementById("pointsValue").innerText = data.points;
        amountInput.value = "";
    } else {
        alert(data.error);
    }
}
</script>
